<!DOCTYPE html>
<html>
<head>
    <style>
      .card {
    position: relative;
    width: 300px;
    height: 400px;
    background: white;
    overflow: hidden;
    transition: all 0.3s;
}

.card.deleting::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 0;
    height: 0;
    background: linear-gradient(135deg, #ff6b6b, #c92a2a);
    animation: cornerDelete 1s forwards;
    z-index: 10;
}

@keyframes cornerDelete {
    0% {
        width: 0;
        height: 0;
        opacity: 1;
    }
    50% {
        width: 100%;
        height: 100%;
        border-radius: 0;
    }
    100% {
        width: 100%;
        height: 100%;
        background: #c92a2a;
        opacity: 1;
    }
}
    </style>
</head>
<body>
    <div class="card" id="taskCard">
        <button class="delete-btn" id="deleteBtn">🗑️</button>
        <div class="card-content">
            <h2>Complete Project</h2>
            <p>Finish the quarterly report and submit to manager before deadline.</p>
            <div style="color: #999;">📅 Due: Tomorrow</div>
            <div style="margin-top: 15px; padding: 5px 10px; background: #ffebee; color: #c62828; border-radius: 20px; display: inline-block; align-self: flex-start;">High Priority</div>
        </div>
    </div>
    
    <script>
        const card = document.getElementById('taskCard');
        const deleteBtn = document.getElementById('deleteBtn');
        
        deleteBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            
            // Start delete animation
            card.classList.add('deleting');
            
            // After animation ends, hide the card
            setTimeout(() => {
                card.classList.add('deleted');
                // أو card.remove() إذا تبي تحذفه نهائياً
            }, 1000); // نفس مدة animation
        });
    </script>
</body>
</html>
