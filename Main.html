<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styles/Cards.css">
    <title>read card – single priority & status chips</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <div class="card" data-priority="low">


        <div class="drag-handle" title="drag to reorder">
            <i class="fa-solid fa-grip-lines"></i>
        </div>


        <div class="options-btn" title="options">
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>


        <div class="delBtn" title="delete">
            <i class="fa-regular fa-circle-xmark"></i>
        </div>


        <div class="chip-row">
            <div class="chip priority-chip">
                <i class="fa-solid fa-circle" style="color: var(--low-color);"></i>
                <span>Low</span>
            </div>
            <div class="chip status-chip" data-status="doing">
                <i class="fa-regular fa-clock"></i>
                <span>Doing</span>
            </div>
        </div>
        <div class="title-display">
            Design new user flow · finalise mockups and present to stakeholders by Friday
        </div>
        <div class="due-info">
            <i class="fa-regular fa-calendar"></i>
            <span class="due-date">25 MAR 2026</span>
            <span class="remaining">3 days left</span>
        </div>
    </div>
</body>

</html>
